name: Terraform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init (local)
        run: terraform init -backend=false
      - name: Terraform Validate
        run: terraform validate

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, security, validate]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      
      - name: Decode GCP credentials
        run: |
          echo "${{ secrets.GCP_CREDENTIALS_BASE64 }}" | base64 --decode > gcp-sa-key.json
          head -n 5 gcp-sa-key.json

      
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_BASE64 }}

      
      - name: Terraform Init
        run: terraform init -input=false -reconfigure

      
      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_project_id: "chas-devsecops-2026"
          TF_VAR_region: "europe-west1"
          TF_VAR_student_id: "abdulelah-hanoun"